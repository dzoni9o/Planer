<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NikVolt</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="logo">NIKVOLT</div>
    <div class="hint-bar" id="hint">Dodaj prvu prostoriju →</div>
    <button class="btn btn-ghost btn-icon" onclick="fitScreen()" title="Prilagodi prikaz" style="font-size:14px">⊡</button>
    <button class="btn btn-ghost btn-icon" onclick="promptReset()" title="Resetuj projekat" style="font-size:14px;color:var(--text3)">↺</button>
  </div>

  <div id="canvas-wrap">
    <svg id="svg">
      <g id="g-vp">
        <g id="g-snap"></g>
        <g id="g-rooms"></g>
        <g id="g-walls"></g>
        <g id="g-elements"></g>
        <g id="g-boxes"></g>
        <g id="g-conns"></g>
      </g>
      <g id="g-legend"></g>
    </svg>
    <div id="zoom-badge">100%</div>
  </div>

  <div class="toolbar" id="toolbar">
    <!-- DEFAULT -->
    <div class="tb-default">
      <div class="menu-group menu-primary">
        <button class="btn btn-primary tool-btn tool-btn-wide" onclick="promptAddRoom()" title="Dodaj prostoriju" aria-label="Dodaj prostoriju">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V8l8-4 8 4v12H4Zm3-3h10V9.8l-5-2.5-5 2.5V17Zm5-1v-4m-2 2h4"/></svg>
          <span class="tool-label">Prostorija</span>
        </button>
      </div>
      <div class="menu-group">
        <button class="btn btn-ghost tool-btn" onclick="promptConnect()" title="Povezi dozne" aria-label="Povezi dozne">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8a4 4 0 0 1 4-4h2m4 12a4 4 0 0 1-4 4h-2M8 12h8M5 12h.01M19 12h.01"/></svg>
        </button>
        <button class="btn btn-ghost tool-btn" onclick="toggleBill()" title="Obracun materijala" aria-label="Obracun materijala" id="btn-bill">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10v18H7V3Zm3 5h4m-4 4h4m-4 4h2"/></svg>
        </button>
      </div>
      <div class="menu-group">
        <button class="btn btn-ghost tool-btn" onclick="exportPdf()" title="Izvoz PDF" aria-label="Izvoz PDF">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l3 3v15H7V3Zm7 0v4h4M9 15h6M9 18h4"/><path d="M9 11h1.5a1.5 1.5 0 0 0 0-3H9v5m5-5v5h1.2a2.5 2.5 0 0 0 0-5H14"/></svg>
        </button>
        <button class="btn btn-ghost tool-btn" onclick="exportProjectJson()" title="Izvoz projekta JSON" aria-label="Izvoz projekta JSON">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v11m0 0 4-4m-4 4-4-4M5 17v3h14v-3"/></svg>
        </button>
        <button class="btn btn-ghost tool-btn" onclick="triggerImportProject()" title="Uvoz projekta JSON" aria-label="Uvoz projekta JSON">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21V10m0 0 4 4m-4-4-4 4M5 7V4h14v3"/></svg>
        </button>
      </div>
      <input id="import-json-input" type="file" accept="application/json,.json" style="display:none" onchange="importProjectJson(event)">
    </div>
    <!-- WALL SELECTED -->
    <div class="tb-wall">
      <div class="tb-label"><strong id="wall-sel-label">Zid selektovan</strong>Tapni akciju</div>
      <div class="menu-group">
        <button class="btn btn-blue tool-btn tool-btn-wide" onclick="promptAddBox()" title="Dodaj doznu" aria-label="Dodaj doznu">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12a7 7 0 1 0 14 0 7 7 0 0 0-14 0Zm7-3v6m-3-3h6"/></svg>
          <span class="tool-label">Dozna</span>
        </button>
        <button class="btn btn-ghost tool-btn" onclick="promptAddDoor()" title="Vrata" aria-label="Vrata">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 21V4l10-1v18H7Zm7-9h.01M5 21h14"/></svg>
        </button>
        <button class="btn btn-ghost tool-btn" onclick="promptAddWindow()" title="Prozor" aria-label="Prozor">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4V5Zm8 0v14M4 12h16"/></svg>
        </button>
        <button class="btn btn-ghost tool-btn" onclick="showWallPreview()" title="Pregled zida" aria-label="Pregled zida">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18h16M6 18V8h12v10M8 8V5h8v3M9 14h6"/></svg>
        </button>
        <button class="btn btn-ghost tool-btn" id="btn-toggle-wall" onclick="toggleWallOpen()" title="Ukloni ili vrati zid" aria-label="Ukloni ili vrati zid">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h16M4 12h16M4 16h16M8 6v12m8-12v12"/></svg>
        </button>
        <button class="btn btn-ghost tool-btn" onclick="clearSel()" title="Zatvori izbor" aria-label="Zatvori izbor">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 7 10 10M17 7 7 17"/></svg>
        </button>
      </div>
    </div>
    <!-- CONNECT MODE -->
    <div class="tb-connect">
      <div class="tb-label" id="conn-hint-label"><strong>Poveži dozne</strong>Tapni prvu doznu</div>
      <button class="btn btn-ghost" onclick="exitConnect()">Otkaži</button>
    </div>
  </div>

</div>

<!-- Sheet (bottom drawer) -->
<div class="sheet-bg" id="sheet-bg">
  <div class="sheet" id="sheet-body"></div>
</div>

<!-- Bill panel -->
<div id="bill-wrap" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:150;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:360px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:16px 20px 12px;flex-shrink:0;border-bottom:1px solid var(--border)">
      <div style="font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em">OBRAČUN MATERIJALA</div>
    </div>
    <div id="bill-body" style="overflow-y:auto;flex:1;padding:0 20px 8px;-webkit-overflow-scrolling:touch"></div>
    <div style="padding:12px 20px;flex-shrink:0;border-top:1px solid var(--border)">
      <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="toggleBill()">Zatvori</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 18px;font-size:11px;color:var(--text);font-family:var(--font);z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap"></div>
<script src="modules.js"></script>
<script src="catalog.js"></script>
<script src="app.js"></script>
<script src="pdf-export.js"></script>
</body>
</html>
