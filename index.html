<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NikVolt</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="logo">NIKVOLT</div>
    <div class="hint-bar" id="hint">Dodaj prvu prostoriju →</div>
    <button class="btn btn-ghost btn-icon" onclick="fitScreen()" title="Prilagodi prikaz" style="font-size:14px">⊡</button>
    <button class="btn btn-ghost btn-icon" onclick="promptReset()" title="Resetuj projekat" style="font-size:14px;color:var(--text3)">↺</button>
  </div>

  <div id="canvas-wrap">
    <svg id="svg">
      <g id="g-vp">
        <g id="g-snap"></g>
        <g id="g-rooms"></g>
        <g id="g-walls"></g>
        <g id="g-elements"></g>
        <g id="g-boxes"></g>
        <g id="g-conns"></g>
      </g>
      <g id="g-legend"></g>
    </svg>
    <div id="zoom-badge">100%</div>
  </div>

  <div class="toolbar" id="toolbar">
    <!-- DEFAULT -->
    <div class="tb-default">
      <button class="btn btn-primary" onclick="promptAddRoom()">＋ Prostorija</button>
      <button class="btn btn-ghost btn-icon" onclick="promptConnect()" title="Poveži dozne">〰</button>
      <button class="btn btn-ghost btn-icon" onclick="toggleBill()" title="Obračun" id="btn-bill">📋</button>
      <button class="btn btn-ghost btn-icon" onclick="exportPdf()" title="Izvoz PDF">PDF</button>
      <button class="btn btn-ghost btn-icon" onclick="exportProjectJson()" title="Izvoz projekta JSON">JSON↓</button>
      <button class="btn btn-ghost btn-icon" onclick="triggerImportProject()" title="Uvoz projekta JSON">JSON↑</button>
      <input id="import-json-input" type="file" accept="application/json,.json" style="display:none" onchange="importProjectJson(event)">
    </div>
    <!-- WALL SELECTED -->
    <div class="tb-wall">
      <div class="tb-label"><strong id="wall-sel-label">Zid selektovan</strong>Tapni akciju</div>
      <button class="btn btn-blue" onclick="promptAddBox()">＋ Dozna</button>
      <button class="btn btn-ghost btn-icon" onclick="promptAddDoor()" title="Vrata">🚪</button>
      <button class="btn btn-ghost btn-icon" onclick="promptAddWindow()" title="Prozor">🪟</button>
      <button class="btn btn-ghost btn-icon" onclick="showWallPreview()" title="Pregled zida">📐</button>
      <button class="btn btn-ghost btn-icon" id="btn-toggle-wall" onclick="toggleWallOpen()" title="Ukloni/vrati zid">🧱</button>
      <button class="btn btn-ghost" onclick="clearSel()">✕</button>
    </div>
    <!-- CONNECT MODE -->
    <div class="tb-connect">
      <div class="tb-label" id="conn-hint-label"><strong>Poveži dozne</strong>Tapni prvu doznu</div>
      <button class="btn btn-ghost" onclick="exitConnect()">Otkaži</button>
    </div>
  </div>

</div>

<!-- Sheet (bottom drawer) -->
<div class="sheet-bg" id="sheet-bg">
  <div class="sheet" id="sheet-body"></div>
</div>

<!-- Bill panel -->
<div id="bill-wrap" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:150;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:360px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:16px 20px 12px;flex-shrink:0;border-bottom:1px solid var(--border)">
      <div style="font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em">OBRAČUN MATERIJALA</div>
    </div>
    <div id="bill-body" style="overflow-y:auto;flex:1;padding:0 20px 8px;-webkit-overflow-scrolling:touch"></div>
    <div style="padding:12px 20px;flex-shrink:0;border-top:1px solid var(--border)">
      <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="toggleBill()">Zatvori</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 18px;font-size:11px;color:var(--text);font-family:var(--font);z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap"></div>
<script src="catalog.js"></script>
<script src="app.js"></script>
<script src="pdf-export.js"></script>
</body>
</html>
